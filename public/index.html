    .result-content { font-size: 14px; color: #ccc; line-height: 1.9; }
    .result-content strong { color: #fff; font-weight: 700; }
    .result-content em { color: #aaa; font-style: italic; }
    .btn-copy { width: 100%; padding: 12px; background: transparent; border: 1px solid #ff6b3550; border-radius: 12px; color: #ff6b35; font-family: 'Poppins', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 16px; transition: all 0.3s; }

    };

    function t(key) { return T[currentLang][key] || T['français'][key]; }

    function applyLang() {
      document.getElementById('status-text').textContent = t('status');
      document.querySelector('.t-recette').textContent = t('recette');
      document.querySelector('.t-menu').textContent = t('menu');
      document.querySelector('.t-conseil').textContent = t('conseil');
      document.querySelector('.t-historique').textContent = t('historique');
      updateTabContent();
    }

    function changeLang(lang) {
      currentLang = lang;
      localStorage.setItem('chefola_lang', lang);
      applyLang();
    }

    function updateTabContent() {
      const tab = currentTab;
      if (tab === 'historique') {
        document.getElementById('history-title').textContent = '📚 ' + t('historique');
        renderHistory();
        return;
      }
      if (tab === 'recette') {
        document.getElementById('hero-title').textContent = t('hero_r');
        document.getElementById('hero-subtitle').textContent = t('sub_r');
        document.getElementById('input-label').textContent = t('label_r');
        document.getElementById('user-input').placeholder = t('ph_r');
        document.getElementById('btn-main').textContent = t('btn_r');
        document.getElementById('loading-text').textContent = t('loading');
        document.querySelector('.hero-emoji').textContent = '🍳';
        document.getElementById('chips').style.display = 'flex';
      } else if (tab === 'menu') {
        document.getElementById('hero-title').textContent = t('hero_m');
        document.getElementById('hero-subtitle').textContent = t('sub_m');
        document.getElementById('input-label').textContent = t('label_m');
        document.getElementById('user-input').placeholder = t('ph_m');
        document.getElementById('btn-main').textContent = t('btn_m');
        document.getElementById('loading-text').textContent = t('loading');
        document.querySelector('.hero-emoji').textContent = '📅';
        document.getElementById('chips').style.display = 'flex';
      } else {
        document.getElementById('hero-title').textContent = t('hero_c');
        document.getElementById('hero-subtitle').textContent = t('sub_c');
        document.getElementById('input-label').textContent = t('label_c');
        document.getElementById('user-input').placeholder = t('ph_c');
        document.getElementById('btn-main').textContent = t('btn_c');
        document.getElementById('loading-text').textContent = t('loading');
        document.querySelector('.hero-emoji').textContent = '💡';
        document.getElementById('chips').style.display = 'none';
      }
      document.getElementById('error-text').textContent = t('error');
      document.getElementById('btn-copy').textContent = t('copy');
    }

    function formatText(text) {
      return text
        .replace(/^#{1,3} (.+)/gm, '<div class="section-title">$1</div>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/^- (.+)/gm, '<div class="step-item">$1</div>')
        .replace(/^-{3,}$/gm, '')
        .replace(/\n\n/g, '<br><br>')
        .replace(/\n/g, '<br>');
    }

    function setTab(tab, el) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      if (tab === 'historique') {
        document.getElementById('main-page').style.display = 'none';
        document.getElementById('history-page').classList.add('show');
        renderHistory();
        return;
      }
      document.getElementById('main-page').style.display = 'block';
      document.getElementById('history-page').classList.remove('show');
      document.getElementById('user-input').value = '';
      hideResult();
      updateTabContent();
    }

    function addChip(ingredient) {
      const input = document.getElementById('user-input');
      const val = input.value.trim();
      input.value = val ? val + ', ' + ingredient : ingredient;
    }

    function hideResult() {
      document.getElementById('result').classList.remove('show');
      document.getElementById('error').classList.remove('show');
      document.getElementById('loading').classList.remove('show');
    }

    async function generate() {
      const input = document.getElementById('user-input').value.trim();
      if (!input) { alert("⚠️ " + t('ph_r')); return; }
      const btn = document.getElementById('btn-main');
      btn.disabled = true;
      hideResult();
      document.getElementById('loading').classList.add('show');
      try {
        let url, body;
        if (currentTab === 'recette') {
          url = API + '/recipe';
          body = { ingredients: input.split(',').map(i => i.trim()), langue: currentLang };
        } else if (currentTab === 'menu') {
          url = API + '/menu';
          body = { ingredients: input.split(',').map(i => i.trim()), langue: currentLang };
        } else {
          url = API + '/conseil';
          body = { question: input, langue: currentLang };
        }
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        lastResult = data.recette || data.menu || data.conseil;
        document.getElementById('loading').classList.remove('show');
        document.getElementById('result-content').innerHTML = formatText(lastResult);
        const titles = { recette: t('title_r'), menu: t('title_m'), conseil: t('title_c') };
        document.getElementById('result-title').textContent = titles[currentTab];
        document.getElementById('result').classList.add('show');
        saveToHistory(currentTab, input, lastResult);
      } catch (err) {
        document.getElementById('loading').classList.remove('show');
        document.getElementById('error').classList.add('show');
      }
      btn.disabled = false;
    }

    function saveToHistory(type, query, content) {
      const history = JSON.parse(localStorage.getItem('chefola_history') || '[]');
      history.unshift({ id: Date.now(), type, query, content, lang: currentLang, date: new Date().toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }) });
      if (history.length > 30) history.pop();
      localStorage.setItem('chefola_history', JSON.stringify(history));
    }

    function renderHistory() {
      const history = JSON.parse(localStorage.getItem('chefola_history') || '[]');
      const container = document.getElementById('history-list');
      if (history.length === 0) {
        container.innerHTML = `<div class="history-empty"><p>🍽️</p><span>${t('empty')}<br>${t('empty2')}</span></div>`;
        return;
      }
      const icons = { recette: '🍽️', menu: '📅', conseil: '💡' };
      container.innerHTML = history.map(item => `
        <div class="history-item" onclick="openModal(${item.id})">
          <button class="history-item-delete" onclick="deleteItem(event,${item.id})">×</button>
          <div class="history-item-header">
            <span class="history-item-type">${icons[item.type]} ${item.type}</span>
            <span class="history-item-date">${item.date}</span>
          </div>
          <div class="history-item-title">${item.query.substring(0,50)}${item.query.length>50?'...':''}</div>
          <div class="history-item-preview">${item.content.substring(0,100)}...</div>
        </div>`).join('');
    }

    function openModal(id) {
      const history = JSON.parse(localStorage.getItem('chefola_history') || '[]');
      const item = history.find(h => h.id === id);
      if (!item) return;
      document.getElementById('modal-title').textContent = item.query.substring(0,40);
      document.getElementById('modal-body').innerHTML = formatText(item.content);
      document.getElementById('modal').classList.add('show');
    }

    function closeModal() { document.getElementById('modal').classList.remove('show'); }

    function deleteItem(e, id) {
      e.stopPropagation();
      let history = JSON.parse(localStorage.getItem('chefola_history') || '[]');
      history = history.filter(h => h.id !== id);
      localStorage.setItem('chefola_history', JSON.stringify(history));
      renderHistory();
    }

    function clearHistory() {
      if (confirm(t('empty'))) {
        localStorage.removeItem('chefola_history');
        renderHistory();
      }
    }
    
    function copyResult() {
      navigator.clipboard.writeText(lastResult).then(() => {
        const btn = document.getElementById('btn-copy');
        btn.textContent = t('copied');
        setTimeout(() => btn.textContent = t('copy'), 2000);
      });
    }

    function shareWhatsApp() {
      const text = encodeURIComponent("🍳 Chef Ola IA :\n\n" + lastResult);
      window.open("https://wa.me/?text=" + text, '_blank');
    }

    // INIT
    const savedLang = localStorage.getItem('chefola_lang') || 'français';
    currentLang = savedLang;
    document.getElementById('lang-select').value = savedLang;
    applyLang();
  </script>
</body>
</html>
